<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>HabitFlow</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header__title">Habit<span class="brand-accent">Flow</span></h1>
      <span id="header-date" class="header__date"></span>
      <div class="header__actions">
        <button id="logout-btn" class="icon-btn" type="button" aria-label="Log out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
        <a href="habit-form.html" class="icon-btn" aria-label="Add habit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </a>
      </div>
    </header>

    <main id="habit-list" class="habit-list">
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-card__top">
          <div class="skeleton skeleton-card__icon"></div>
          <div class="skeleton skeleton-card__text"></div>
          <div class="skeleton skeleton-card__action"></div>
        </div>
        <div class="skeleton skeleton-card__grid"></div>
      </div>
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-card__top">
          <div class="skeleton skeleton-card__icon"></div>
          <div class="skeleton skeleton-card__text"></div>
          <div class="skeleton skeleton-card__action"></div>
        </div>
        <div class="skeleton skeleton-card__grid"></div>
      </div>
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-card__top">
          <div class="skeleton skeleton-card__icon"></div>
          <div class="skeleton skeleton-card__text"></div>
          <div class="skeleton skeleton-card__action"></div>
        </div>
        <div class="skeleton skeleton-card__grid"></div>
      </div>
    </main>

    <!-- Requirements popup -->
    <div id="req-popup-overlay" class="popup-overlay hidden" role="dialog" aria-modal="true" aria-label="Requirements">
      <div class="popup">
        <div id="req-popup-header" class="popup__header"></div>
        <div id="req-popup-body" class="popup__body"></div>
        <div id="req-popup-actions" class="popup__actions">
          <button id="req-popup-cancel" type="button" class="btn btn--secondary">Cancel</button>
          <button id="req-popup-submit" type="button" class="btn btn--primary">Save</button>
        </div>
        <div id="req-popup-confirm" class="popup__confirm hidden">
          <p class="popup__confirm-text">Not all requirements met.</p>
          <div class="popup__actions">
            <button id="req-popup-skip" type="button" class="btn btn--secondary">Skip</button>
            <button id="req-popup-partial" type="button" class="btn btn--secondary">Partial</button>
            <button id="req-popup-complete" type="button" class="btn btn--primary">Complete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
