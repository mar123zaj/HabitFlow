<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>HabitFlow — Details</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="container form-page">
    <header class="detail-header">
      <a href="index.html" class="icon-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="detail-header__info">
        <div id="habit-icon" class="detail-header__icon"></div>
        <span id="habit-name" class="detail-header__name"></span>
        <span id="habit-freq" class="detail-header__freq"></span>
      </div>
      <a id="edit-link" href="#" class="icon-btn" aria-label="Edit habit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </a>
    </header>

    <p id="habit-description" class="description-text hidden"></p>

    <!-- Dot grid overview -->
    <section id="overview-section" class="detail-overview"></section>

    <!-- Stats -->
    <div id="stats-section" class="detail-stats"></div>

    <!-- Calendar navigation -->
    <nav class="calendar-nav">
      <button id="prev-month" class="icon-btn" type="button" aria-label="Previous month">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="month-label" class="calendar-nav__label"></span>
      <button id="next-month" class="icon-btn" type="button" aria-label="Next month">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </nav>

    <!-- Weekday headers -->
    <div class="calendar-weekdays">
      <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>

    <!-- Calendar grid -->
    <div id="calendar-grid" class="calendar-grid"></div>

    <!-- Requirements popup -->
    <div id="req-popup-overlay" class="popup-overlay hidden" role="dialog" aria-modal="true" aria-label="Requirements">
      <div class="popup">
        <div id="req-popup-header" class="popup__header"></div>
        <div id="req-popup-body" class="popup__body"></div>
        <div id="req-popup-actions" class="popup__actions">
          <button id="req-popup-cancel" type="button" class="btn btn--secondary">Cancel</button>
          <button id="req-popup-submit" type="button" class="btn btn--primary">Save</button>
        </div>
        <div id="req-popup-confirm" class="popup__confirm hidden">
          <p class="popup__confirm-text">Not all requirements met.</p>
          <div class="popup__actions">
            <button id="req-popup-skip" type="button" class="btn btn--secondary">Skip</button>
            <button id="req-popup-partial" type="button" class="btn btn--secondary">Partial</button>
            <button id="req-popup-complete" type="button" class="btn btn--primary">Complete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { getHabitById } from './js/habits.js';
    import { fetchLogs, fetchAllLogs, toggleLog } from './js/logs.js';
    import { fetchRequirements, fetchRequirementLogs, saveRequirementLogs, clearRequirementLogs } from './js/requirements.js';
    import { getLocalDate, getDateRange, groupLogsByHabit, renderDotGrid, hexToRgb } from './js/ui.js';

    const params = new URLSearchParams(window.location.search);
    const habitId = params.get('id');
    if (!habitId) window.location.replace('index.html');

    const habitIconEl = document.getElementById('habit-icon');
    const habitNameEl = document.getElementById('habit-name');
    const habitFreqEl = document.getElementById('habit-freq');
    const habitDescEl = document.getElementById('habit-description');
    const editLink = document.getElementById('edit-link');
    const monthLabel = document.getElementById('month-label');
    const prevMonthBtn = document.getElementById('prev-month');
    const nextMonthBtn = document.getElementById('next-month');
    const calendarGrid = document.getElementById('calendar-grid');
    const overviewSection = document.getElementById('overview-section');
    const statsSection = document.getElementById('stats-section');

    let habit = null;
    let logsMap = {};
    let viewYear, viewMonth;
    let habitRequirements = [];

    function renderHeader() {
      const { r, g, b } = hexToRgb(habit.color);
      habitIconEl.style.backgroundColor = `rgba(${r}, ${g}, ${b}, 0.2)`;
      habitNameEl.textContent = habit.name;
      habitFreqEl.textContent = habit.daily_target > 1 ? `(${habit.daily_target}x)` : '';
      editLink.href = `habit-form.html?id=${habit.id}`;
      habitIconEl.textContent = habit.icon;

      if (habit.description) {
        habitDescEl.textContent = habit.description;
        habitDescEl.classList.remove('hidden');
      }
    }

    async function loadMonth() {
      const firstDay = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-01`;
      const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
      const lastDay = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(lastDate).padStart(2, '0')}`;

      monthLabel.textContent = new Date(viewYear, viewMonth).toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'long',
      });

      const logs = await fetchLogs(habit.id, firstDay, lastDay);
      logsMap = {};
      for (const log of logs) {
        logsMap[log.log_date] = log.count;
      }

      renderCalendar(lastDate);
    }

    function renderCalendar(daysInMonth) {
      calendarGrid.innerHTML = '';
      const { r, g, b } = hexToRgb(habit.color);
      const today = getLocalDate();
      const activeWeekdays = habit.active_weekdays || [1, 2, 3, 4, 5, 6, 0];
      const startDate = habit.start_date || null;

      const firstDow = new Date(viewYear, viewMonth, 1).getDay();
      const offset = (firstDow + 6) % 7;

      for (let i = 0; i < offset; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-cell calendar-cell--empty';
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const count = logsMap[dateStr] || 0;
        const dayOfWeek = new Date(viewYear, viewMonth, day).getDay();
        const isApplicable = activeWeekdays.includes(dayOfWeek);
        const isBeforeStart = startDate && dateStr < startDate;

        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'calendar-cell';
        cell.dataset.date = dateStr;
        cell.dataset.count = count;

        if (isBeforeStart) {
          cell.className = 'calendar-cell calendar-cell--empty';
          cell.disabled = true;
          const daySpan = document.createElement('span');
          daySpan.className = 'calendar-cell__day';
          daySpan.textContent = day;
          cell.appendChild(daySpan);
          calendarGrid.appendChild(cell);
          continue;
        }

        if (dateStr === today) cell.classList.add('calendar-cell--today');
        if (!isApplicable && count === 0) cell.classList.add('calendar-cell--non-applicable');

        if (count >= habit.daily_target) {
          cell.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
          cell.style.color = '#fff';
        } else if (count > 0) {
          const opacity = Math.max(0.15, count / habit.daily_target);
          cell.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        const daySpan = document.createElement('span');
        daySpan.className = 'calendar-cell__day';
        daySpan.textContent = day;
        cell.appendChild(daySpan);

        if (habit.daily_target > 1) {
          const countSpan = document.createElement('span');
          countSpan.className = 'calendar-cell__count';
          countSpan.textContent = `${count}/${habit.daily_target}`;
          cell.appendChild(countSpan);
        }

        calendarGrid.appendChild(cell);
      }
    }

    function updateCellVisual(cell, count) {
      const { r, g, b } = hexToRgb(habit.color);

      cell.dataset.count = count;
      cell.style.backgroundColor = '';
      cell.style.color = '';
      cell.classList.remove('calendar-cell--non-applicable');

      if (count >= habit.daily_target) {
        cell.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        cell.style.color = '#fff';
      } else if (count > 0) {
        const opacity = Math.max(0.15, count / habit.daily_target);
        cell.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
      } else {
        const dateStr = cell.dataset.date;
        const dayOfWeek = new Date(dateStr + 'T00:00:00').getDay();
        const activeWeekdays = habit.active_weekdays || [1, 2, 3, 4, 5, 6, 0];
        if (!activeWeekdays.includes(dayOfWeek)) {
          cell.classList.add('calendar-cell--non-applicable');
        }
      }

      if (habit.daily_target > 1) {
        const countSpan = cell.querySelector('.calendar-cell__count');
        if (countSpan) countSpan.textContent = `${count}/${habit.daily_target}`;
      }
    }

    // ── Requirements popup (static DOM, shared pattern) ──
    const popupOverlay = document.getElementById('req-popup-overlay');
    const popupHeader = document.getElementById('req-popup-header');
    const popupBody = document.getElementById('req-popup-body');
    const popupActions = document.getElementById('req-popup-actions');
    const popupSubmit = document.getElementById('req-popup-submit');
    const popupCancel = document.getElementById('req-popup-cancel');
    const popupConfirm = document.getElementById('req-popup-confirm');
    const popupSkip = document.getElementById('req-popup-skip');
    const popupPartial = document.getElementById('req-popup-partial');
    const popupComplete = document.getElementById('req-popup-complete');

    let popupResolve = null;

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function collectLogs() {
      if (!popupResolve) return null;
      const { fields, date, iteration } = popupResolve;

      const logs = [];
      let allFulfilled = true;
      let anyFilled = false;

      for (const { req, field } of fields) {
        if (req.type === 'boolean') {
          const checked = field.querySelector('input[type="checkbox"]').checked;
          logs.push({ requirement_id: req.id, habit_id: habitId, log_date: date, iteration, value: checked ? 1 : 0, fulfilled: checked });
          if (checked) anyFilled = true;
          if (!checked) allFulfilled = false;
        } else {
          const val = parseFloat(field.querySelector('input[type="number"]').value);
          const fulfilled = !isNaN(val) && req.target_value != null && val >= req.target_value;
          logs.push({ requirement_id: req.id, habit_id: habitId, log_date: date, iteration, value: isNaN(val) ? null : val, fulfilled });
          if (!isNaN(val) && val > 0) anyFilled = true;
          if (!fulfilled) allFulfilled = false;
        }
      }
      return { logs, allFulfilled, anyFilled };
    }

    function closePopup() {
      popupOverlay.classList.add('hidden');
      popupResolve = null;
    }

    async function openRequirementsPopup(date, iteration) {
      popupHeader.textContent = `${habit.icon} ${habit.name} — Iteration ${iteration}`;
      popupBody.innerHTML = '';
      popupActions.classList.remove('hidden');
      popupConfirm.classList.add('hidden');

      const existingLogs = await fetchRequirementLogs(habitId, date).catch(() => []);
      const logsByReq = {};
      for (const log of existingLogs) {
        if (log.iteration === iteration) logsByReq[log.requirement_id] = log;
      }

      const fields = [];
      for (const req of habitRequirements) {
        const field = document.createElement('div');
        field.className = 'requirement-input';
        const prev = logsByReq[req.id];

        if (req.type === 'boolean') {
          const checked = prev ? prev.fulfilled : false;
          field.innerHTML = `<label class="requirement-input__label"><input type="checkbox" data-req-id="${esc(req.id)}" ${checked ? 'checked' : ''}> ${esc(req.name)}</label>`;
        } else {
          const unitLabel = req.unit ? ` (${esc(req.unit)})` : '';
          const targetHint = req.target_value != null ? ` ≥ ${esc(String(req.target_value))}` : '';
          const prevVal = prev && prev.value != null ? prev.value : '';
          field.innerHTML = `<label class="requirement-input__label">${esc(req.name)}${unitLabel}${targetHint}</label><input type="number" class="form-input" data-req-id="${esc(req.id)}" step="any" min="0" placeholder="Value" value="${esc(String(prevVal))}">`;
        }
        popupBody.appendChild(field);
        fields.push({ req, field });
      }

      popupOverlay.classList.remove('hidden');
      popupBody.querySelector('input')?.focus();

      return new Promise((resolve) => {
        popupResolve = { resolve, fields, date, iteration };
      });
    }

    popupCancel.addEventListener('click', () => {
      if (popupResolve) popupResolve.resolve(null);
      closePopup();
    });

    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) {
        if (popupResolve) popupResolve.resolve(null);
        closePopup();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && popupResolve) {
        popupResolve.resolve(null);
        closePopup();
      }
    });

    popupSubmit.addEventListener('click', async () => {
      const result = collectLogs();
      if (!result) return;
      const { logs, allFulfilled, anyFilled } = result;

      if (allFulfilled) {
        await saveRequirementLogs(logs);
        const r = popupResolve;
        closePopup();
        r.resolve('completed');
        return;
      }

      if (anyFilled) {
        popupActions.classList.add('hidden');
        popupConfirm.classList.remove('hidden');
        return;
      }

      if (popupResolve) popupResolve.resolve(null);
      closePopup();
    });

    popupComplete.addEventListener('click', async () => {
      const result = collectLogs();
      if (!result) return;
      await saveRequirementLogs(result.logs);
      const r = popupResolve;
      closePopup();
      r.resolve('completed');
    });

    popupPartial.addEventListener('click', async () => {
      const result = collectLogs();
      if (!result) return;
      await saveRequirementLogs(result.logs);
      const r = popupResolve;
      closePopup();
      r.resolve('partial');
    });

    popupSkip.addEventListener('click', () => {
      if (popupResolve) popupResolve.resolve(null);
      closePopup();
    });

    // Cell click — toggle (with requirements support)
    calendarGrid.addEventListener('click', async (e) => {
      const cell = e.target.closest('.calendar-cell:not(.calendar-cell--empty)');
      if (!cell) return;

      const date = cell.dataset.date;
      const currentCount = parseInt(cell.dataset.count, 10) || 0;
      const newCount = (currentCount + 1) % (habit.daily_target + 1);

      if (habitRequirements.length > 0 && newCount > 0) {
        const popupResult = await openRequirementsPopup(date, newCount);
        if (!popupResult) return;
      }

      if (habitRequirements.length > 0 && newCount === 0) {
        clearRequirementLogs(habitId, date).catch(() => {});
      }

      logsMap[date] = newCount;
      updateCellVisual(cell, newCount);

      try {
        await toggleLog(habit.id, date, currentCount, habit.daily_target);
      } catch {
        logsMap[date] = currentCount;
        updateCellVisual(cell, currentCount);
      }
    });

    prevMonthBtn.addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      loadMonth();
      renderStats();
    });

    nextMonthBtn.addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      loadMonth();
      renderStats();
    });

    async function renderOverview() {
      const { startDate, endDate } = getDateRange();
      const allLogs = await fetchAllLogs([habitId], startDate, endDate);
      const logsGrouped = groupLogsByHabit(allLogs);
      const habitLogs = logsGrouped[habitId] || {};

      allLogsCache = allLogs;

      overviewSection.innerHTML = '';
      const dotGrid = renderDotGrid(habit, habitLogs);
      overviewSection.appendChild(dotGrid);

      renderStats();
    }

    let allLogsCache = [];

    function countApplicableDays(fromDate, toDate) {
      const activeWeekdays = habit.active_weekdays || [1, 2, 3, 4, 5, 6, 0];
      let count = 0;
      const d = new Date(fromDate + 'T00:00:00');
      const end = new Date(toDate + 'T00:00:00');
      while (d <= end) {
        if (activeWeekdays.includes(d.getDay())) count++;
        d.setDate(d.getDate() + 1);
      }
      return count;
    }

    function renderStats() {
      const today = getLocalDate();
      const { startDate: gridStart } = getDateRange();
      const effectiveStart = habit.start_date && habit.start_date > gridStart ? habit.start_date : gridStart;

      const totalApplicable = countApplicableDays(effectiveStart, today);
      const totalCompleted = allLogsCache.filter((l) => l.count >= habit.daily_target).length;

      const monthPrefix = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;
      const monthFirstDay = `${monthPrefix}-01`;
      const monthLastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
      const monthLastDay = `${monthPrefix}-${String(monthLastDate).padStart(2, '0')}`;
      const monthEnd = monthLastDay < today ? monthLastDay : today;
      const monthStart = effectiveStart > monthFirstDay ? effectiveStart : monthFirstDay;
      const monthApplicable = monthStart <= monthEnd ? countApplicableDays(monthStart, monthEnd) : 0;
      const monthCompleted = allLogsCache
        .filter((l) => l.log_date.startsWith(monthPrefix) && l.count >= habit.daily_target).length;

      const monthName = new Date(viewYear, viewMonth).toLocaleDateString(undefined, { month: 'long' });

      statsSection.innerHTML =
        `<span class="detail-stat">Total: <strong>${totalCompleted}/${totalApplicable}</strong></span>` +
        `<span class="detail-stat">${monthName}: <strong>${monthCompleted}/${monthApplicable}</strong></span>`;
    }

    // Init
    requireAuth().then(async (session) => {
      if (!session) return;
      habit = await getHabitById(habitId);
      habitRequirements = await fetchRequirements(habitId);
      renderHeader();

      const now = new Date();
      viewYear = now.getFullYear();
      viewMonth = now.getMonth();
      await Promise.all([loadMonth(), renderOverview()]);
    });
  </script>
</body>
</html>
