<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>HabitFlow — Habit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="container form-page">
    <header class="form-header">
      <h1 id="page-title" class="form-header__title">New Habit</h1>
      <a href="index.html" class="icon-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </a>
    </header>

    <form id="habit-form" novalidate>
      <!-- Name -->
      <div class="form-group">
        <label for="habit-name" class="form-label">Name</label>
        <input id="habit-name" type="text" class="form-input" placeholder="e.g. Morning run" maxlength="50" required>
      </div>

      <!-- Emoji Picker -->
      <fieldset class="form-group">
        <legend class="form-label">Icon</legend>
        <div id="emoji-grid" class="emoji-grid"></div>
      </fieldset>

      <!-- Color Picker -->
      <fieldset class="form-group">
        <legend class="form-label">Color</legend>
        <div id="color-grid" class="color-grid"></div>
      </fieldset>

      <!-- Description -->
      <div class="form-group">
        <label for="habit-description" class="form-label">Description</label>
        <textarea id="habit-description" class="form-input" placeholder="Add a note about this habit..." maxlength="256" rows="2"></textarea>
        <span id="char-counter" class="char-counter">0 / 256</span>
      </div>

      <!-- Daily Frequency -->
      <div class="form-group">
        <label for="freq-input" class="form-label">Daily frequency</label>
        <div class="stepper">
          <button id="freq-dec" type="button" class="stepper__btn" aria-label="Decrease frequency">&minus;</button>
          <input id="freq-input" type="number" class="stepper__input" value="1" min="1" max="99" inputmode="numeric">
          <button id="freq-inc" type="button" class="stepper__btn" aria-label="Increase frequency">+</button>
        </div>
      </div>

      <!-- Weekday Picker -->
      <fieldset class="form-group">
        <legend class="form-label">Active days</legend>
        <div id="weekday-picker" class="weekday-picker"></div>
      </fieldset>

      <!-- Start Date -->
      <div class="form-group">
        <label for="habit-start-date" class="form-label">Start date</label>
        <input id="habit-start-date" type="date" class="form-input">
      </div>

      <!-- Requirements Editor -->
      <fieldset class="form-group" id="requirements-section">
        <legend class="form-label">Requirements (optional)</legend>
        <div id="requirements-list" class="requirements-editor"></div>
        <button id="add-requirement-btn" type="button" class="btn btn--secondary" style="margin-top: var(--space-sm)">+ Add requirement</button>
      </fieldset>

      <!-- Actions -->
      <div class="form-actions">
        <a href="index.html" class="btn btn--secondary">Cancel</a>
        <button id="save-btn" type="submit" class="btn btn--primary">Save</button>
      </div>

      <div id="delete-section" class="form-actions hidden">
        <button id="delete-btn" type="button" class="btn btn--danger">Delete habit</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { createHabit, updateHabit, deleteHabit, getHabitById } from './js/habits.js';
    import { fetchRequirements, saveRequirements } from './js/requirements.js';

    const EMOJIS = [
      '🏃', '💪', '🧘', '🚴', '🏊', '⚽', '🎾', '🥊',
      '💧', '🥗', '🍎', '💊', '😴', '🧴', '🦷', '❤️',
      '📖', '🧠', '🎯', '✍️', '📝', '🎨', '🎵', '🧩',
      '💻', '📧', '🧹', '🌱', '☀️', '🐕', '📸', '💰',
      '🙏', '😊', '🚶', '🎮', '☕', '📚', '🔥', '⭐',
      '📋', '🎧', '💼', '🛡️', '🚫', '📵', '🍷', '⏰',
      '🏠', '🌙', '🏆', '🧭', '🚀', '🎓', '🧘‍♂️', '💎',
    ];

    const COLORS = [
      { name: 'blue',   hex: '#3b82f6' },
      { name: 'green',  hex: '#22c55e' },
      { name: 'purple', hex: '#a855f7' },
      { name: 'red',    hex: '#ef4444' },
      { name: 'orange', hex: '#f97316' },
      { name: 'yellow', hex: '#eab308' },
      { name: 'pink',   hex: '#ec4899' },
      { name: 'teal',   hex: '#14b8a6' },
      { name: 'gray',   hex: '#6b7280' },
      { name: 'white',  hex: '#e5e7eb' },
      { name: 'lime',   hex: '#84cc16' },
      { name: 'indigo', hex: '#6366f1' },
    ];

    const WEEKDAYS = [
      { value: 1, label: 'Mon' },
      { value: 2, label: 'Tue' },
      { value: 3, label: 'Wed' },
      { value: 4, label: 'Thu' },
      { value: 5, label: 'Fri' },
      { value: 6, label: 'Sat' },
      { value: 0, label: 'Sun' },
    ];

    const REQ_TYPES = [
      { value: 'boolean', label: 'Checklist item' },
      { value: 'duration', label: 'Duration', units: ['min', 'h'] },
      { value: 'distance', label: 'Distance', units: ['km', 'mi'] },
      { value: 'weight', label: 'Weight', units: ['kg', 'lbs'] },
      { value: 'count', label: 'Repetitions', units: ['reps', 'sets'] },
      { value: 'custom', label: 'Custom', units: [] },
    ];

    const pageTitle = document.getElementById('page-title');
    const form = document.getElementById('habit-form');
    const nameInput = document.getElementById('habit-name');
    const emojiGrid = document.getElementById('emoji-grid');
    const colorGrid = document.getElementById('color-grid');
    const freqInput = document.getElementById('freq-input');
    const freqDec = document.getElementById('freq-dec');
    const freqInc = document.getElementById('freq-inc');
    const saveBtn = document.getElementById('save-btn');
    const deleteSection = document.getElementById('delete-section');
    const deleteBtn = document.getElementById('delete-btn');
    const descriptionInput = document.getElementById('habit-description');
    const charCounter = document.getElementById('char-counter');
    const startDateInput = document.getElementById('habit-start-date');
    const weekdayPicker = document.getElementById('weekday-picker');
    const requirementsList = document.getElementById('requirements-list');
    const addReqBtn = document.getElementById('add-requirement-btn');

    let selectedEmoji = null;
    let selectedColor = null;
    let frequency = 1;
    let editId = null;
    let activeWeekdays = [1, 2, 3, 4, 5, 6, 0];
    let requirements = [];

    // ── Build emoji grid ──
    for (const emoji of EMOJIS) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'emoji-option';
      btn.textContent = emoji;
      btn.setAttribute('aria-label', emoji);
      btn.addEventListener('click', () => selectEmoji(emoji, btn));
      emojiGrid.appendChild(btn);
    }

    function selectEmoji(emoji, btn) {
      selectedEmoji = emoji;
      emojiGrid.querySelectorAll('.emoji-option').forEach((b) => b.classList.remove('emoji-option--selected'));
      btn.classList.add('emoji-option--selected');
    }

    // ── Build color grid ──
    const SVG_CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    for (const color of COLORS) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'color-option';
      btn.style.backgroundColor = color.hex;
      btn.setAttribute('aria-label', color.name);
      btn.innerHTML = `<span class="color-option__check">${SVG_CHECK}</span>`;
      btn.addEventListener('click', () => selectColor(color.hex, btn));
      colorGrid.appendChild(btn);
    }

    function selectColor(hex, btn) {
      selectedColor = hex;
      colorGrid.querySelectorAll('.color-option').forEach((b) => b.classList.remove('color-option--selected'));
      btn.classList.add('color-option--selected');
    }

    // ── Frequency stepper ──
    function updateFrequency() {
      freqInput.value = frequency;
      freqDec.disabled = frequency <= 1;
      freqInc.disabled = frequency >= 99;
    }

    freqDec.addEventListener('click', () => {
      if (frequency > 1) { frequency--; updateFrequency(); }
    });

    freqInc.addEventListener('click', () => {
      if (frequency < 99) { frequency++; updateFrequency(); }
    });

    freqInput.addEventListener('change', () => {
      const val = parseInt(freqInput.value, 10);
      if (!isNaN(val) && val >= 1 && val <= 99) frequency = val;
      updateFrequency();
    });

    updateFrequency();

    // ── Description character counter ──
    descriptionInput.addEventListener('input', () => {
      charCounter.textContent = `${descriptionInput.value.length} / 256`;
    });

    // ── Start date validation ──
    const today = new Date().toISOString().split('T')[0];
    startDateInput.max = today;

    // ── Weekday picker ──
    function buildWeekdayPicker() {
      weekdayPicker.innerHTML = '';
      for (const day of WEEKDAYS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'weekday-btn';
        btn.textContent = day.label;
        btn.dataset.value = day.value;
        if (activeWeekdays.includes(day.value)) btn.classList.add('weekday-btn--active');
        btn.addEventListener('click', () => toggleWeekday(day.value, btn));
        weekdayPicker.appendChild(btn);
      }
    }

    function toggleWeekday(value, btn) {
      if (activeWeekdays.includes(value)) {
        if (activeWeekdays.length <= 1) return;
        activeWeekdays = activeWeekdays.filter((d) => d !== value);
        btn.classList.remove('weekday-btn--active');
      } else {
        activeWeekdays.push(value);
        btn.classList.add('weekday-btn--active');
      }
    }

    buildWeekdayPicker();

    // ── Requirements editor ──
    function escAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getTypeConfig(type) {
      return REQ_TYPES.find((t) => t.value === type);
    }

    function renderRequirementRow(req, index) {
      const row = document.createElement('div');
      row.className = 'requirement-row';
      row.dataset.index = index;

      const typeConfig = getTypeConfig(req.type);
      const isMeasurement = req.type !== 'boolean';

      row.innerHTML = `
        <div class="requirement-row__main">
          <input type="text" class="form-input requirement-row__name" placeholder="Requirement name" value="${escAttr(req.name || '')}" data-field="name" required>
          <select class="form-input requirement-row__type" data-field="type">
            ${REQ_TYPES.map((t) => `<option value="${t.value}" ${t.value === req.type ? 'selected' : ''}>${t.label}</option>`).join('')}
          </select>
        </div>
        <div class="requirement-row__fields ${isMeasurement ? '' : 'hidden'}">
          ${req.type === 'custom'
            ? `<input type="text" class="form-input requirement-row__unit" placeholder="Unit" value="${escAttr(req.unit || '')}" data-field="unit">`
            : (typeConfig?.units?.length
              ? `<select class="form-input requirement-row__unit" data-field="unit">
                  ${typeConfig.units.map((u) => `<option value="${u}" ${u === req.unit ? 'selected' : ''}>${u}</option>`).join('')}
                </select>`
              : '')}
          <input type="number" class="form-input requirement-row__target" placeholder="Target" value="${escAttr(String(req.target_value ?? ''))}" data-field="target_value" step="any" min="0">
        </div>
        <div class="requirement-row__actions">
          <button type="button" class="icon-btn requirement-row__up" aria-label="Move up" ${index === 0 ? 'disabled' : ''}>↑</button>
          <button type="button" class="icon-btn requirement-row__down" aria-label="Move down" ${index === requirements.length - 1 ? 'disabled' : ''}>↓</button>
          <button type="button" class="icon-btn requirement-row__delete" aria-label="Remove">✕</button>
        </div>
      `;

      row.querySelector('.requirement-row__type').addEventListener('change', (e) => {
        req.type = e.target.value;
        req.unit = getTypeConfig(req.type)?.units?.[0] || '';
        req.target_value = req.type === 'boolean' ? null : req.target_value;
        renderAllRequirements();
      });

      row.querySelector('.requirement-row__name').addEventListener('input', (e) => { req.name = e.target.value; });

      const unitEl = row.querySelector('[data-field="unit"]');
      if (unitEl) unitEl.addEventListener('input', (e) => { req.unit = e.target.value; });
      if (unitEl) unitEl.addEventListener('change', (e) => { req.unit = e.target.value; });

      const targetEl = row.querySelector('[data-field="target_value"]');
      if (targetEl) targetEl.addEventListener('input', (e) => { req.target_value = e.target.value ? parseFloat(e.target.value) : null; });

      row.querySelector('.requirement-row__up').addEventListener('click', () => {
        if (index === 0) return;
        [requirements[index - 1], requirements[index]] = [requirements[index], requirements[index - 1]];
        renderAllRequirements();
      });

      row.querySelector('.requirement-row__down').addEventListener('click', () => {
        if (index === requirements.length - 1) return;
        [requirements[index], requirements[index + 1]] = [requirements[index + 1], requirements[index]];
        renderAllRequirements();
      });

      row.querySelector('.requirement-row__delete').addEventListener('click', () => {
        requirements.splice(index, 1);
        renderAllRequirements();
      });

      return row;
    }

    function renderAllRequirements() {
      requirementsList.innerHTML = '';
      requirements.forEach((req, i) => {
        requirementsList.appendChild(renderRequirementRow(req, i));
      });
    }

    addReqBtn.addEventListener('click', () => {
      requirements.push({ name: '', type: 'boolean', unit: null, target_value: null });
      renderAllRequirements();
    });

    // ── Edit mode ──
    const params = new URLSearchParams(window.location.search);
    editId = params.get('id');

    async function loadEditData() {
      if (!editId) return;
      pageTitle.textContent = 'Edit Habit';
      deleteSection.classList.remove('hidden');

      const habit = await getHabitById(editId);
      nameInput.value = habit.name;
      frequency = habit.daily_target;
      updateFrequency();

      if (habit.description) {
        descriptionInput.value = habit.description;
        charCounter.textContent = `${habit.description.length} / 256`;
      }

      if (habit.start_date) {
        startDateInput.value = habit.start_date;
      }

      if (habit.active_weekdays) {
        activeWeekdays = habit.active_weekdays;
        buildWeekdayPicker();
      }

      const emojiBtn = [...emojiGrid.children].find((b) => b.textContent === habit.icon);
      if (emojiBtn) selectEmoji(habit.icon, emojiBtn);
      else selectedEmoji = habit.icon;

      const colorBtn = [...colorGrid.children].find((b) => b.style.backgroundColor === hexToRgbStr(habit.color));
      if (colorBtn) selectColor(habit.color, colorBtn);
      else selectedColor = habit.color;

      const existingReqs = await fetchRequirements(editId);
      requirements = existingReqs.map((r) => ({ ...r }));
      renderAllRequirements();
    }

    function hexToRgbStr(hex) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgb(${r}, ${g}, ${b})`;
    }

    // ── Form submit ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();

      if (!name) { nameInput.focus(); return; }
      if (!selectedEmoji) { alert('Please select an icon.'); return; }
      if (!selectedColor) { alert('Please select a color.'); return; }

      const invalidReq = requirements.find((r) => r.name.trim() === '');
      if (invalidReq) { alert('All requirements must have a name.'); return; }

      saveBtn.classList.add('btn--loading');
      saveBtn.innerHTML = '<span class="spinner"></span>';

      try {
        const payload = {
          name,
          icon: selectedEmoji,
          color: selectedColor,
          dailyTarget: frequency,
          startDate: startDateInput.value || null,
          activeWeekdays: activeWeekdays,
          description: descriptionInput.value.trim() || null,
        };

        let habitId;
        if (editId) {
          await updateHabit(editId, payload);
          habitId = editId;
        } else {
          const created = await createHabit(payload);
          habitId = created.id;
        }

        await saveRequirements(habitId, requirements.map((r, i) => ({
          id: r.id || undefined,
          name: r.name.trim(),
          type: r.type,
          unit: r.type === 'boolean' ? null : (r.unit || null),
          target_value: r.type === 'boolean' ? null : (r.target_value ?? null),
          sort_order: i,
        })));

        window.location.replace('index.html');
      } catch (err) {
        alert(err.message || 'Failed to save habit.');
        saveBtn.classList.remove('btn--loading');
        saveBtn.textContent = 'Save';
      }
    });

    // ── Delete ──
    deleteBtn.addEventListener('click', async () => {
      if (!confirm('Delete this habit and all its history?')) return;
      try {
        await deleteHabit(editId);
        window.location.replace('index.html');
      } catch (err) {
        alert(err.message || 'Failed to delete habit.');
      }
    });

    // ── Init ──
    requireAuth().then((session) => {
      if (session) loadEditData();
    });
  </script>
</body>
</html>
