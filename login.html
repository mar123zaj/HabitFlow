<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>HabitFlow — Log in</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-logo">Habit<span class="brand-accent">Flow</span></h1>

      <div id="auth-error" class="auth-error" role="alert"></div>
      <div id="auth-message" class="auth-message" role="status"></div>

      <form id="auth-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div id="password-group" class="form-group">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Min. 6 characters" autocomplete="current-password" minlength="6" required>
        </div>

        <button id="submit-btn" type="submit" class="btn btn--primary">Log in</button>
      </form>

      <p id="auth-toggle" class="auth-toggle">
        Don't have an account? <a href="#" id="toggle-link">Sign up</a>
      </p>

      <p id="auth-forgot" class="auth-forgot">
        <a href="#" id="forgot-link">Forgot password?</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { signIn, signUp, resetPassword, getSession } from './js/auth.js';

    const form = document.getElementById('auth-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const passwordGroup = document.getElementById('password-group');
    const submitBtn = document.getElementById('submit-btn');
    const toggleLink = document.getElementById('toggle-link');
    const authToggle = document.getElementById('auth-toggle');
    const forgotLink = document.getElementById('forgot-link');
    const authForgot = document.getElementById('auth-forgot');
    const errorEl = document.getElementById('auth-error');
    const messageEl = document.getElementById('auth-message');

    let mode = 'login'; // 'login' | 'signup' | 'reset'

    function setMode(newMode) {
      mode = newMode;
      errorEl.textContent = '';
      errorEl.classList.remove('auth-error--visible');
      messageEl.textContent = '';
      messageEl.classList.remove('auth-message--visible');

      if (mode === 'login') {
        submitBtn.textContent = 'Log in';
        toggleLink.textContent = 'Sign up';
        authToggle.firstChild.textContent = "Don't have an account? ";
        passwordGroup.classList.remove('hidden');
        authForgot.classList.remove('hidden');
        passwordInput.required = true;
      } else if (mode === 'signup') {
        submitBtn.textContent = 'Sign up';
        toggleLink.textContent = 'Log in';
        authToggle.firstChild.textContent = 'Already have an account? ';
        passwordGroup.classList.remove('hidden');
        authForgot.classList.add('hidden');
        passwordInput.required = true;
      } else {
        submitBtn.textContent = 'Send reset link';
        toggleLink.textContent = 'Log in';
        authToggle.firstChild.textContent = 'Back to ';
        passwordGroup.classList.add('hidden');
        authForgot.classList.add('hidden');
        passwordInput.required = false;
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('auth-error--visible');
      messageEl.classList.remove('auth-message--visible');
    }

    function showMessage(msg) {
      messageEl.textContent = msg;
      messageEl.classList.add('auth-message--visible');
      errorEl.classList.remove('auth-error--visible');
    }

    function setLoading(loading) {
      if (loading) {
        submitBtn.classList.add('btn--loading');
        submitBtn.innerHTML = '<span class="spinner"></span>';
      } else {
        submitBtn.classList.remove('btn--loading');
        setMode(mode);
      }
    }

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (mode === 'login') setMode('signup');
      else setMode('login');
    });

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('reset');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !email.includes('@')) {
        showError('Please enter a valid email address.');
        return;
      }

      if (mode !== 'reset' && password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      setLoading(true);
      try {
        if (mode === 'login') {
          await signIn(email, password);
          window.location.replace('index.html');
        } else if (mode === 'signup') {
          await signUp(email, password);
          showMessage('Check your email to confirm your account.');
        } else {
          await resetPassword(email);
          showMessage('Password reset link sent to your email.');
        }
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    // Redirect if already authenticated
    getSession().then((session) => {
      if (session) window.location.replace('index.html');
    });
  </script>
</body>
</html>
