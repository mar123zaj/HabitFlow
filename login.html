<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>HabitFlow — Log in</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-logo">Habit<span class="brand-accent">Flow</span></h1>

      <div id="auth-error" class="auth-error" role="alert"></div>
      <div id="auth-message" class="auth-message" role="status"></div>

      <form id="auth-form" class="auth-form" novalidate>
        <div id="email-group" class="form-group">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div id="password-group" class="form-group">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Min. 6 characters" autocomplete="current-password" minlength="6" required>
        </div>

        <div id="confirm-password-group" class="form-group hidden">
          <label for="confirm-password" class="form-label">Confirm password</label>
          <input id="confirm-password" type="password" class="form-input" placeholder="Repeat your new password" autocomplete="new-password" minlength="6">
        </div>

        <button id="submit-btn" type="submit" class="btn btn--primary">Log in</button>
      </form>

      <p id="auth-toggle" class="auth-toggle">
        Don't have an account? <a href="#" id="toggle-link">Sign up</a>
      </p>

      <p id="auth-forgot" class="auth-forgot">
        <a href="#" id="forgot-link">Forgot password?</a>
      </p>

      <div id="auth-confirmation" class="auth-confirmation" role="status" aria-live="polite">
        <div class="auth-confirmation__icon">✉️</div>
        <h2 class="auth-confirmation__title">Check your inbox</h2>
        <p class="auth-confirmation__hint">
          We sent a confirmation link to<br>
          <span id="confirmation-email" class="auth-confirmation__email"></span>
        </p>
        <p class="auth-confirmation__change">
          Wrong address? <a href="#" id="change-email-link">Use a different email</a>
        </p>
      </div>
    </div>
  </main>

  <script type="module">
    import { signIn, signUp, resetPassword, updatePassword, mapAuthError, getSession, onAuthStateChange } from './js/auth.js';

    const hash = window.location.hash;
    const isRecoveryCallback = hash.includes('type=recovery');
    const isSignupCallback = hash.includes('type=signup');

    const form = document.getElementById('auth-form');
    const emailInput = document.getElementById('email');
    const emailGroup = document.getElementById('email-group');
    const passwordInput = document.getElementById('password');
    const passwordLabel = document.querySelector('label[for="password"]');
    const passwordGroup = document.getElementById('password-group');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const confirmPasswordGroup = document.getElementById('confirm-password-group');
    const submitBtn = document.getElementById('submit-btn');
    const toggleLink = document.getElementById('toggle-link');
    const authToggle = document.getElementById('auth-toggle');
    const forgotLink = document.getElementById('forgot-link');
    const authForgot = document.getElementById('auth-forgot');
    const errorEl = document.getElementById('auth-error');
    const messageEl = document.getElementById('auth-message');
    const confirmationEl = document.getElementById('auth-confirmation');
    const confirmationEmailEl = document.getElementById('confirmation-email');
    const changeEmailLink = document.getElementById('change-email-link');

    let mode = 'login';
    let isFormSubmitting = false;
    let signupEmail = '';

    function setMode(newMode) {
      mode = newMode;
      errorEl.textContent = '';
      errorEl.classList.remove('auth-error--visible');
      messageEl.textContent = '';
      messageEl.classList.remove('auth-message--visible');
      confirmationEl.classList.remove('auth-confirmation--visible');

      form.classList.remove('hidden');
      emailGroup.classList.remove('hidden');
      passwordGroup.classList.remove('hidden');
      confirmPasswordGroup.classList.add('hidden');
      authToggle.classList.remove('hidden');
      authForgot.classList.remove('hidden');
      passwordInput.required = true;
      confirmPasswordInput.required = false;
      passwordLabel.textContent = 'Password';
      passwordInput.placeholder = 'Min. 6 characters';
      passwordInput.autocomplete = 'current-password';

      if (mode === 'login') {
        submitBtn.textContent = 'Log in';
        toggleLink.textContent = 'Sign up';
        authToggle.firstChild.textContent = "Don't have an account? ";
      } else if (mode === 'signup') {
        submitBtn.textContent = 'Sign up';
        toggleLink.textContent = 'Log in';
        authToggle.firstChild.textContent = 'Already have an account? ';
        authForgot.classList.add('hidden');
      } else if (mode === 'reset') {
        submitBtn.textContent = 'Send reset link';
        toggleLink.textContent = 'Log in';
        authToggle.firstChild.textContent = 'Back to ';
        passwordGroup.classList.add('hidden');
        authForgot.classList.add('hidden');
        passwordInput.required = false;
      } else if (mode === 'update-password') {
        submitBtn.textContent = 'Update password';
        emailGroup.classList.add('hidden');
        confirmPasswordGroup.classList.remove('hidden');
        authToggle.classList.add('hidden');
        authForgot.classList.add('hidden');
        passwordLabel.textContent = 'New password';
        passwordInput.placeholder = 'Min. 6 characters';
        passwordInput.autocomplete = 'new-password';
        confirmPasswordInput.required = true;
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('auth-error--visible');
      messageEl.classList.remove('auth-message--visible');
    }

    function showMessage(msg) {
      messageEl.textContent = msg;
      messageEl.classList.add('auth-message--visible');
      errorEl.classList.remove('auth-error--visible');
    }

    function showConfirmation(email) {
      signupEmail = email;
      confirmationEmailEl.textContent = email;
      form.classList.add('hidden');
      authToggle.classList.add('hidden');
      authForgot.classList.add('hidden');
      errorEl.classList.remove('auth-error--visible');
      messageEl.classList.remove('auth-message--visible');
      confirmationEl.classList.add('auth-confirmation--visible');
    }

    const BUTTON_TEXT = { login: 'Log in', signup: 'Sign up', reset: 'Send reset link', 'update-password': 'Update password' };

    function setLoading(loading) {
      if (loading) {
        submitBtn.classList.add('btn--loading');
        submitBtn.innerHTML = '<span class="spinner"></span>';
      } else {
        submitBtn.classList.remove('btn--loading');
        submitBtn.textContent = BUTTON_TEXT[mode];
      }
    }

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (mode === 'login') setMode('signup');
      else setMode('login');
    });

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('reset');
    });

    changeEmailLink.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('signup');
      emailInput.value = signupEmail;
      emailInput.focus();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (mode !== 'update-password' && (!email || !email.includes('@'))) {
        showError('Please enter a valid email address.');
        return;
      }

      if (mode !== 'reset' && password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      if (mode === 'update-password') {
        const confirmPassword = confirmPasswordInput.value;
        if (password !== confirmPassword) {
          showError('Passwords do not match.');
          return;
        }
      }

      setLoading(true);
      isFormSubmitting = true;
      try {
        if (mode === 'login') {
          await signIn(email, password);
          window.location.replace('index.html');
        } else if (mode === 'signup') {
          await signUp(email, password);
          showConfirmation(email);
        } else if (mode === 'reset') {
          await resetPassword(email);
          showMessage('Password reset link sent to your email.');
        } else if (mode === 'update-password') {
          await updatePassword(password);
          showMessage('Password updated successfully!');
          setTimeout(() => window.location.replace('index.html'), 1500);
          return;
        }
      } catch (err) {
        showError(mapAuthError(err.message));
      } finally {
        isFormSubmitting = false;
        setLoading(false);
      }
    });

    onAuthStateChange((event, session) => {
      if (isFormSubmitting) return;

      if (event === 'PASSWORD_RECOVERY') {
        setMode('update-password');
      } else if (event === 'SIGNED_IN' && isSignupCallback) {
        showMessage('Email confirmed! Redirecting...');
        setTimeout(() => window.location.replace('index.html'), 1500);
      }
    });

    if (!isRecoveryCallback && !isSignupCallback) {
      getSession().then((session) => {
        if (session) window.location.replace('index.html');
      });
    }
  </script>
</body>
</html>
